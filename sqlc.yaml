version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/persistence/postgresql/sql/queries.sql"
    schema: "internal/infrastructure/persistence/postgresql/sql/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/persistence/postgresql/sqlc"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
